spring:
  application:
    name: springai-knowledge-server

  datasource:
      url: jdbc:postgresql://localhost:5432/springai_knowledge
      username: postgres
      password: ${PG_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  rabbitmq:
    password: ${RABBITMQ_PASSWORD}

  ai:
    openai:
      base-url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY}
      chat:
        options:
          model: Pro/moonshotai/Kimi-K2.5
      embedding:
        options:
          model: BAAI/bge-large-zh-v1.5
    vectorstore:
      pgvector:
        dimensions: 1024
        initialize-schema: true
        table-name: document_embedding
        id-type: TEXT

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

security:
  jwt:
    secret: change-me-please-change-me-32-bytes
    expiration-seconds: 3600

app:
  admin:
    username: admin
    password: admin123
  document:
    storage-path: ./data/documents
    chunk-size: 1000
    chunk-overlap: 200
  rag:
    top-k: 6
    similarity-threshold: 0.2
