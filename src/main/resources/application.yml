spring:
  application:
    name: springai-knowledge-server

  datasource:
      url: jdbc:postgresql://localhost:5432/springai_knowledge
      username: postgres
      password: ${PG_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  rabbitmq:
    password: ${RABBITMQ_PASSWORD}

  ai:
    openai:
      base-url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY}
      chat:
        options:
          model: Pro/moonshotai/Kimi-K2.5
      embedding:
        options:
          model: BAAI/bge-large-zh-v1.5
    vectorstore:
      pgvector:
        dimensions: 1024
        initialize-schema: true
        table-name: document_embedding
        id-type: TEXT

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

security:
  jwt:
    secret: change-me-please-change-me-32-bytes
    expiration-seconds: 3600

app:
  admin:
    username: admin
    password: admin123
  document:
    storage-path: ./data/documents
    chunk-size: 1000
    chunk-overlap: 200
  rag:
    answer-style: 简洁、准确、专业
    max-answer-chars: 300
    max-output-tokens: 512
    temperature: 0.2
    top-p: 0.9
  hybrid:
    top-k: 6
    vector-top-k: 6
    vector-similarity-threshold: 0.2
    keyword-top-k: 6
    vector-weight: 0.7
    keyword-weight: 0.3
  rerank:
    enabled: true
    base-url: https://api.siliconflow.cn/v1/rerank
    model: BAAI/bge-reranker-v2-m3
    top-n: 6
    max-docs: 30
